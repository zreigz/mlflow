# ─────────────────────────────────────────────────────────────────────────────
# MLflow Helm values – community-charts/mlflow 1.8.1
# Target: local kind cluster
# ─────────────────────────────────────────────────────────────────────────────

# ── Backend store ─────────────────────────────────────────────────────────────
# databaseMigration/databaseConnectionCheck apply regardless of DB mode.
# When postgresql.enabled=true the chart auto-wires the connection string;
# backendStore.postgres is for external Postgres only (schema mutually exclusive).
backendStore:
  databaseMigration: true
  databaseConnectionCheck: true

# ── Artifact store ────────────────────────────────────────────────────────────
artifactRoot:
  proxiedArtifactStorage: true
  defaultArtifactRoot: "/mlartifacts"

# ── Embedded PostgreSQL (Bitnami sub-chart) ───────────────────────────────────
postgresql:
  enabled: true
  auth:
    username: mlflow
    password: "mlflow"
    database: mlflow
  primary:
    persistence:
      enabled: true
      size: 2Gi
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi

# ── MLflow server ─────────────────────────────────────────────────────────────
replicaCount: 1

resources:
  requests:
    cpu: 100m
    memory: 512Mi
  limits:
    cpu: 500m
    memory: 1536Mi

# ── Service ───────────────────────────────────────────────────────────────────
# nodePort is not in the chart schema; use type: NodePort for a random port
# or access via: kubectl port-forward svc/mlflow -n mlflow 5000:5000
service:
  enabled: true
  type: NodePort
  port: 5000

# ── Ingress (disabled – use NodePort or port-forward) ────────────────────────
ingress:
  enabled: false

# ── Auth (disabled for local dev) ────────────────────────────────────────────
auth:
  enabled: false

serviceAccount:
  create: true
